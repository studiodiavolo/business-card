<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Diavolo Business Card</title>
     <link rel="stylesheet" href="main.css"> 
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <section class="card-flip">
            <div class="card-inner-flip">
                <div class="card-front">
                    <img src="assets/front-card.png" alt="front card studio diavolo">
                </div>
                <div class="card-back">
                    <img src="assets/back-card.png" alt="back card studio diavolo">
                    <div class="back-content">
                        <img src="assets/icon-logo.svg" alt="logo studio diavolo">
                        <img src="assets/name-logo.svg" alt="name logo studio diavolo">
                        <p class="role">Graphic Designer</p>
                        <p class="email"><a href="mailto:studiodiavolodesign@gmail.com">studiodiavolodesign@gmail.com</a></p>
                        <p class="portfolio-site"><a href="https://valentinavinces.wixstudio.com/portfolio" target="_blank" rel="nonopener nonreferrer">Portfolio Site</a></p>
                        <div class="social links">
                            <a href="https://www.instagram.com/studio.diavolo" target="_blank" rel="nonopener nonreferrer">
                                <img src="assets/instagram-icon.svg" alt="instagram icon">
                            </a>
                            <a href="https://www.behance.net/ValeVinces" target="_blank" rel="nonopener nonreferrer" >
                                <img src="assets/behance-icon.svg" alt="behance icon">
                            </a>
                            <a href="https://www.linkedin.com/in/valentina-vinces" target="_blank" rel="nonopener nonreferrer">
                                <img src="assets/linkedin-icon.svg" alt="linkedin icon">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        </div>
        </main>
</body>
</html>
